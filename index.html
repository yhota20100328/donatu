<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ風ガチャゲーム</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
}

.gacha-box{
    margin:40px auto;
    width:90%;
    max-width:320px;
    height:300px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    transition:0.3s;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.rare-SSR{
    background:radial-gradient(circle,gold,orange);
    color:black;
    box-shadow:0 0 40px gold;
    animation:shine 1s infinite alternate;
}

.rare-SR{
    background:radial-gradient(circle,violet,purple);
}

.rare-R{
    background:radial-gradient(circle,skyblue,blue);
}

.rare-N{
    background:radial-gradient(circle,lightgray,gray);
}

button{
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:gold;
    color:black;
    font-weight:bold;
}

button:hover{
    transform:scale(1.1);
}

@keyframes shine{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}

.log{
    margin-top:20px;
    max-height:150px;
    overflow-y:auto;
    font-size:14px;
}
</style>
</head>

<body>

<h1>✨ スマホ風ガチャ ✨</h1>

<div id="result" class="gacha-box">
ボタンを押してガチャ！
</div>

<button onclick="drawGacha()">ガチャを引く</button>

<div class="log" id="log"></div>

<script>
const characters=[
    {name:"伝説の勇者",rarity:"SSR",rate:5},
    {name:"闇の魔導士",rarity:"SR",rate:15},
    {name:"王国騎士",rarity:"R",rate:30},
    {name:"村人A",rarity:"N",rate:50}
];

function drawGacha(){
    const resultBox=document.getElementById("result");
    resultBox.className="gacha-box";
    resultBox.textContent="演出中...";

    setTimeout(()=>{
        let rand=Math.random()*100;
        let sum=0;
        let selected;

        for(let char of characters){
            sum+=char.rate;
            if(rand<=sum){
                selected=char;
                break;
            }
        }

        resultBox.textContent=selected.rarity+"： "+selected.name;
        resultBox.classList.add("rare-"+selected.rarity);

        const log=document.getElementById("log");
        log.innerHTML="▶ "+selected.rarity+"： "+selected.name+"<br>"+log.innerHTML;
    },1000);
}
</script>

</body>
</html>
