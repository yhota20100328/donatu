<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ババ抜きゲーム</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

h1 {
    margin-top: 20px;
}

.area {
    margin: 20px;
}

.cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

.card {
    width: 60px;
    height: 90px;
    background: white;
    color: black;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.1);
}

.back {
    background: gray;
    color: gray;
    cursor: pointer;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#message {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>🎴 ババ抜きゲーム</h1>

<div class="area">
    <h2>あなたの手札</h2>
    <div id="playerCards" class="cards"></div>
</div>

<div class="area">
    <h2>CPUの手札</h2>
    <div id="cpuCards" class="cards"></div>
</div>

<button onclick="startGame()">ゲーム開始</button>

<div id="message"></div>

<script>
let player = [];
let cpu = [];
let playerTurn = true;

function createDeck() {
    let suits = ["♠","♥","♦","♣"];
    let deck = [];

    for (let suit of suits) {
        for (let i = 1; i <= 13; i++) {
            deck.push({mark: suit, number: i});
        }
    }

    // ジョーカー追加
    deck.push({mark:"🃏", number: 0});

    return shuffle(deck);
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function removePairs(hand) {
    let count = {};
    for (let card of hand) {
        count[card.number] = (count[card.number] || 0) + 1;
    }
    return hand.filter(card => count[card.number] % 2 !== 0);
}

function startGame() {
    let deck = createDeck();
    player = [];
    cpu = [];

    for (let i = 0; i < deck.length; i++) {
        if (i % 2 === 0) player.push(deck[i]);
        else cpu.push(deck[i]);
    }

    player = removePairs(player);
    cpu = removePairs(cpu);

    playerTurn = true;
    render();
    document.getElementById("message").innerText = "あなたの番です";
}

function render() {
    let playerDiv = document.getElementById("playerCards");
    let cpuDiv = document.getElementById("cpuCards");

    playerDiv.innerHTML = "";
    cpuDiv.innerHTML = "";

    player.forEach((card, index) => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = card.mark === "🃏" ? "🃏" : card.mark + card.number;
        playerDiv.appendChild(div);
    });

    cpu.forEach((card, index) => {
        let div = document.createElement("div");
        div.className = "card back";
        div.innerText = "■";
        div.onclick = () => {
            if (playerTurn) drawFromCPU(index);
        };
        cpuDiv.appendChild(div);
    });
}

function drawFromCPU(index) {
    let drawn = cpu.splice(index,1)[0];
    player.push(drawn);
    player = removePairs(player);

    playerTurn = false;
    checkWin();
    render();

    setTimeout(cpuTurn,1000);
}

function cpuTurn() {
    if (cpu.length === 0 || player.length === 0) return;

    let index = Math.floor(Math.random() * player.length);
    let drawn = player.splice(index,1)[0];
    cpu.push(drawn);
    cpu = removePairs(cpu);

    playerTurn = true;
    checkWin();
    render();
    document.getElementById("message").innerText = "あなたの番です";
}

function checkWin() {
    if (player.length === 0) {
        document.getElementById("message").innerText = "🎉 あなたの勝ち！";
    } else if (cpu.length === 0) {
        document.getElementById("message").innerText = "😢 あなたの負け...";
    }
}
</script>

</body>
</html>
