<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本格ガチャゲーム</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
}

h1{ margin-top:20px; }

.status{
    margin-top:10px;
    font-size:18px;
}

.gacha-box{
    margin:30px auto;
    width:90%;
    max-width:360px;
    min-height:150px;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.result-item{ margin:5px 0; }

.SSR{ color:gold; font-weight:bold; }
.SR{ color:violet; }
.R{ color:skyblue; }
.N{ color:lightgray; }

button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

.single{ background:gold; color:black; }
.ten{ background:crimson; color:white; }
.reset{ background:gray; color:white; }

.buy-small{ background:#4caf50; color:white; }
.buy-medium{ background:#2196f3; color:white; }
.buy-large{ background:#9c27b0; color:white; }

button:hover{ transform:scale(1.05); }

.log{
    margin-top:15px;
    max-height:150px;
    overflow-y:auto;
    font-size:14px;
}
</style>
</head>

<body>

<h1>✨ 本格スマホ風ガチャ ✨</h1>

<div class="status">
💎 所持石：<span id="stones"></span>
</div>

<div class="gacha-box" id="result">
ここに結果が表示されます
</div>

<button class="single" onclick="singleDraw()">単発（50石）</button>
<button class="ten" onclick="tenDraw()">🔥10連（500石）</button>
<button class="reset" onclick="resetStones()">🔄 リセット</button>

<h3>💰 石購入（疑似課金）</h3>
<button class="buy-small" onclick="buyStones(100)">🪙 +100石</button>
<button class="buy-medium" onclick="buyStones(1000)">💎 +1000石</button>
<button class="buy-large" onclick="buyStones(5000)">👑 +5000石</button>

<div class="log" id="log"></div>

<script>
const characters=[
    {name:"伝説の勇者",rarity:"SSR",rate:5},
    {name:"闇の魔導士",rarity:"SR",rate:15},
    {name:"王国騎士",rarity:"R",rate:30},
    {name:"村人A",rarity:"N",rate:50}
];

const INITIAL_STONES = 500;
const SINGLE_COST = 50;
const TEN_COST = 500;

let stones = localStorage.getItem("stones");
if(stones === null){
    stones = INITIAL_STONES;
}else{
    stones = parseInt(stones);
}
updateStoneDisplay();

function updateStoneDisplay(){
    document.getElementById("stones").textContent = stones;
    localStorage.setItem("stones", stones);
}

function getRandomCharacter(){
    let rand=Math.random()*100;
    let sum=0;
    for(let char of characters){
        sum+=char.rate;
        if(rand<=sum){
            return char;
        }
    }
}

function singleDraw(){
    if(stones < SINGLE_COST){
        alert("石が足りません！");
        return;
    }
    stones -= SINGLE_COST;
    updateStoneDisplay();
    showResults([getRandomCharacter()]);
}

function tenDraw(){
    if(stones < TEN_COST){
        alert("石が足りません！");
        return;
    }
    stones -= TEN_COST;
    updateStoneDisplay();

    let results=[];
    for(let i=0;i<10;i++){
        results.push(getRandomCharacter());
    }
    showResults(results);
}

function showResults(results){
    const resultBox=document.getElementById("result");
    resultBox.innerHTML="";

    results.forEach(r=>{
        const div=document.createElement("div");
        div.className="result-item "+r.rarity;
        div.textContent=r.rarity+"： "+r.name;
        resultBox.appendChild(div);
    });

    if(results.some(r=>r.rarity==="SSR")){
        resultBox.style.boxShadow="0 0 40px gold";
    }else{
        resultBox.style.boxShadow="0 0 20px rgba(0,0,0,0.4)";
    }

    const log=document.getElementById("log");
    log.innerHTML="▶ "+results.map(r=>r.rarity).join(", ")+"<br>"+log.innerHTML;
}

function resetStones(){
    if(confirm("石を初期値に戻しますか？")){
        stones = INITIAL_STONES;
        updateStoneDisplay();
        alert("リセット完了！");
    }
}

function buyStones(amount){
    if(confirm(amount+"石を購入しますか？（疑似）")){
        stones += amount;
        updateStoneDisplay();
        alert(amount+"石を購入しました！");
    }
}
</script>

</body>
</html>
